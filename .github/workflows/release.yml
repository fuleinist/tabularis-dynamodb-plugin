name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform-label: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: zip
            binary-suffix: ""
          - platform-label: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: zip
            binary-suffix: ""
          - platform-label: win-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary-suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          STAGE=staging
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/tabularis-dynamodb-plugin${{ matrix.binary-suffix }} "$STAGE/"
          cp manifest.json "$STAGE/"
          (cd "$STAGE" && zip -r ../tabularis-dynamodb-plugin-${{ matrix.platform-label }}.zip .)

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "staging"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\tabularis-dynamodb-plugin${{ matrix.binary-suffix }}" $stage
          Copy-Item "manifest.json" $stage
          Compress-Archive -Path "$stage\*" -DestinationPath "tabularis-dynamodb-plugin-${{ matrix.platform-label }}.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: tabularis-dynamodb-plugin-${{ matrix.platform-label }}.zip
